<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nordtor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#07111f;
    font-family:'Noto Sans SC',Helvetica,sans-serif;
    color:#fff;
    overflow-x:hidden;
}

.hero{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:60px;

    background:
    radial-gradient(circle at top left,#11243d 0%,#07111f 45%),
    #07111f;
}

.container{

    width:100%;
    max-width:1400px;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;
}

.logo{

    margin-bottom:28px;
}

.logo img{

    width:100%;
    max-width:760px;

    filter:brightness(1.1) contrast(1.05);
}

.right{

    text-align:center;
}

.item{

    margin-bottom:18px;
}

.item h2{

    font-family:'Rajdhani',sans-serif;

    font-size:72px;

    font-weight:600;

    letter-spacing:2px;

    color:#fff;

    transform:scaleY(0.72);

    transform-origin:center;

    white-space:nowrap;

    line-height:1;
}

.item.small h2{

    font-size:48px;

    margin-top:8px;
}

.lang-switch{

    position:fixed;

    top:30px;
    right:40px;

    display:flex;
    align-items:center;

    gap:18px;

    z-index:999;
}

.lang-switch a{

    color:#8ea3c7;

    text-decoration:none;

    font-family:'Rajdhani',sans-serif;

    font-size:22px;

    font-weight:600;

    letter-spacing:2px;

    line-height:1;

    display:flex;
    align-items:center;

    transition:0.3s;
}

.lang-switch a:hover{
    color:#ffffff;
}

.bottom{

    background:#0b1728;

    text-align:center;

    padding:64px 20px;

    border-top:1px solid rgba(255,255,255,.06);
}

.bottom h3{

    font-family:'Rajdhani',sans-serif;

    font-size:72px;

    font-weight:600;

    letter-spacing:1px;

    transform:scaleY(0.78);

    transform-origin:center;

    margin-bottom:24px;

    color:#fff;

    line-height:1;
}

.bottom p{

    max-width:850px;

    margin:auto;

    line-height:1.9;

    color:#93a4b7;

    font-size:18px;
}

footer{

    padding:38px 60px;

    background:#06101d;

    border-top:1px solid rgba(255,255,255,.08);

    display:flex;

    justify-content:space-between;

    align-items:center;

    color:#71839a;

    font-size:14px;
}

.footer-links{

    display:flex;

    gap:28px;
}

.footer-links a{

    color:#71839a;

    text-decoration:none;

    transition:.3s;
}

.footer-links a:hover{

    color:#fff;
}

@media(max-width:900px){

    .hero{
        padding:40px 24px;
    }

    .logo{

        margin-bottom:70px;
    }

    .logo img{

        max-width:540px;
    }

    .item h2{

        font-size:46px;
    }

    .item.small h2{

        font-size:34px;
    }

    .bottom h3{

        font-size:38px;
    }

    footer{

        flex-direction:column;

        gap:20px;

        align-items:flex-start;
    }
}

@media(max-width:600px){

    .item h2{

        font-size:34px;
    }

    .item.small h2{

        font-size:26px;
    }

    .lang-switch{

        top:22px;
        right:24px;
    }

    .lang-switch a{

        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="lang-switch">

    <a href="index.html">EN</a>
    <a href="de.html">DE</a>
    <a href="zh.html">中文</a>

</div>

<section class="hero">

<div class="container">

    <div class="logo">

        <img src="logo-negative.png" alt="Nordtor Logo">

    </div>

    <div class="right">

        <div class="item">
            <h2>THE GATEWAY & NETWORK</h2>
        </div>

        <div class="item small">
            <h2>TO THE FUTURE</h2>
        </div>

    </div>

</div>

</section>

<section class="bottom">

    <h3>Gateway to Global Supply Chains</h3>

    <p>
        Nordtor is building a modern logistics and global supply chain gateway for international trade.
    </p>

</section>

<footer>

    <div>
        © 2026 Nordtor UG. All rights reserved.
    </div>

    <div class="footer-links">

        <a href="impressum.html">Impressum</a>

        <a href="privacy.html">Privacy</a>

    </div>

</footer>

</body>
</html>
